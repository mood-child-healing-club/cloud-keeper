    <script type="text/babel" data-type="module">
      const { useState, useEffect, useMemo } = window.React;

      import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
      import {
        getAuth,
        signInWithCustomToken,
        signInAnonymously,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
      import {
        getFirestore,
        doc,
        setDoc,
        onSnapshot,
      } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

      // ☁️ Firebase 초기화 세팅
      let db = null;
      let auth = null;
      let appId = "default-app-id";

      try {
        if (typeof __firebase_config !== "undefined") {
          const firebaseConfig = JSON.parse(__firebase_config);
          const app = initializeApp(firebaseConfig);
          auth = getAuth(app);
          db = getFirestore(app);
          appId = typeof __app_id !== "undefined" ? __app_id : "default-app-id";
        }
      } catch (e) {
        console.error("Firebase 초기화 에러 (로컬 모드로 전환됩니다):", e);
      }

      // 💾 커스텀 훅: 클라우드 실시간 동기화 마법사!
      const useFirestoreSync = (docName, initialData, user) => {
        const [data, setData] = useState(() => {
          if (!db) {
            const saved = localStorage.getItem(`angela_cloud_${docName}`);
            return saved ? JSON.parse(saved) : initialData;
          }
          return initialData;
        });

        useEffect(() => {
          if (!db || !user) return;
          // 에러 수정: 파이어베이스의 문서 참조 경로는 짝수 개의 세그먼트여야 합니다. (컬렉션 경로가 아님)
          // artifacts/{appId}/users/{user.uid}/diary_data/{docName} 구조로 6개의 짝수 세그먼트 설정 완료!
          const docRef = doc(
            db,
            "artifacts",
            appId,
            "users",
            user.uid,
            "diary_data",
            docName,
          );
          const unsubscribe = onSnapshot(
            docRef,
            (snapshot) => {
              if (snapshot.exists()) {
                setData(snapshot.data().value);
              } else {
                setDoc(docRef, { value: initialData });
                setData(initialData);
              }
            },
            (error) => {
              console.error("동기화 에러:", error);
            },
          );
          return () => unsubscribe();
        }, [user, docName]);

        const updateData = (updater) => {
          setData((prev) => {
            const newData =
              typeof updater === "function" ? updater(prev) : updater;
            if (db && user) {
              const docRef = doc(
                db,
                "artifacts",
                appId,
                "users",
                user.uid,
                "diary_data",
                docName,
              );
              setDoc(docRef, { value: newData }, { merge: true });
            } else {
              localStorage.setItem(
                `angela_cloud_${docName}`,
                JSON.stringify(newData),
              );
            }
            return newData;
          });
        };

        return [data, updateData];
      };

                  />
                  <label
                    htmlFor="blindToggle"
                    className="toggle-label block overflow-hidden h-6 rounded-full cursor-pointer border-2 border-berry-DEFAULT"
                    style={{
                      backgroundColor: hideMeaning ? "#ff4d6d" : "#ffc2d1",
                    }}
                  ></label>
                </div>
              </div>
            </div>

            <div className="flex flex-col md:flex-row gap-4">
              <div className="flex md:flex-col overflow-x-auto gap-2 pb-2 md:w-32 shrink-0 hide-scrollbar">
                {vocabData.map((d) => (
                  <button
                    key={d.day}
                    onClick={() => setActiveDay(d.day)}
                    className={`px-3 py-3 font-bold rounded-2xl border-3 border-berry-choco transition-all shrink-0 text-center sm:text-left ${activeDay === d.day ? "bg-berry-dark text-white shadow-[4px_4px_0px_#5a3a41] translate-x-1" : "bg-berry-cream text-berry-choco hover:bg-berry-light/50"}`}
                  >
                    Day {d.day}
                  </button>
                ))}
              </div>

              <div className="flex-1 space-y-4 pb-10">
                <h3 className="font-bold text-lg text-white bg-berry-DEFAULT inline-block px-4 py-1 rounded-full border-2 border-berry-choco mb-2 shadow-sm">
                  {activeData.title}
                </h3>

                {activeData.words.map((w, idx) => (
                  <div
                    key={idx}
                    className={`berry-card p-4 sm:p-5 flex gap-4 items-start transition-opacity ${memorized[w.word] ? "opacity-60 bg-berry-bg" : ""}`}
                  >
                    <button
                      onClick={() => toggleWord(w.word)}
                      className="mt-1 text-2xl transition-transform hover:scale-110 shrink-0"
                    >
                      {memorized[w.word] ? "🍓" : "🤍"}
                    </button>

                    <div className="flex-1">
                      <div className="flex flex-col sm:flex-row sm:items-baseline gap-2 mb-2">
                        <h4
                          className={`text-xl font-bold text-berry-choco ${memorized[w.word] ? "line-through decoration-berry-dark decoration-2" : ""}`}
                        >
                          {w.word}
                        </h4>
                        <span className="text-sm font-bold text-berry-choco bg-berry-grid px-2 py-0.5 rounded-md">
                          = {w.synonyms}
                        </span>
                      </div>

                      <div
                        className={`mt-3 space-y-2 ${hideMeaning ? "blind-text px-3 py-2" : ""}`}
                      >
                        <p className="font-bold text-berry-dark text-base">
                          {w.meaning}
                        </p>
                        <p className="text-sm text-berry-choco leading-relaxed italic border-l-3 border-berry-DEFAULT pl-2">
                          "{w.example}"
                        </p>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      };

      // ════════════════════════════════════════════════════════════
      //   MAIN APP COMPONENT (With Firebase Auth)
      // ════════════════════════════════════════════════════════════
      function App() {
        const [activeView, setActiveView] = useState("timeline");
        const [time, setTime] = useState("");
        const [toast, setToast] = useState(null);
        const [activeMonth, setActiveMonth] = useState(5);
        const [user, setUser] = useState(null);
        const [authLoading, setAuthLoading] = useState(true);

        // Firebase Auth 처리
        useEffect(() => {
          if (!auth) {
            setAuthLoading(false);
            return;
          }
          const initAuth = async () => {
            try {
              if (
                typeof __initial_auth_token !== "undefined" &&
                __initial_auth_token
              ) {
                await signInWithCustomToken(auth, __initial_auth_token);
              } else {
                await signInAnonymously(auth);
              }
            } catch (error) {
              console.error("Auth 에러", error);
            }
          };
          initAuth();
          const unsubscribe = onAuthStateChanged(auth, (u) => {
            setUser(u);
            setAuthLoading(false);
          });
          return () => unsubscribe();
        }, []);

        const [tasks, setTasks] = useFirestoreSync(
          "timeline_tasks",
          initialMonthData,
          user,
        );

        useEffect(() => {
          const updateTime = () => {
            const now = new Date();
            let h = now.getHours();
            let m = now.getMinutes();
            const ampm = h >= 12 ? "PM" : "AM";
            h = h % 12 || 12;
            m = m < 10 ? "0" + m : m;
            setTime(`${h}:${m} ${ampm}`);
          };
          updateTime();
          const timer = setInterval(updateTime, 1000);
          return () => clearInterval(timer);
        }, []);

        const showToast = (msg) => {
          setToast(msg);
          setTimeout(() => setToast(null), 2000);
        };

        const isPerfect = useMemo(() => {
          const activeList =
            tasks[activeMonth]?.tasks.filter((t) => !t.isHeader) || [];
          if (activeList.length === 0) return false;
          return activeList.every((t) => t.checked);
        }, [tasks, activeMonth]);

        if (authLoading) {
          return (
            <div className="h-screen w-full flex items-center justify-center bg-berry-bg">
              <span className="text-6xl animate-bounce">🍓</span>
            </div>
          );
        }

        return (
          <div className="min-h-screen relative pb-20 md:pb-8 flex flex-col items-center p-4 sm:p-6 overflow-x-hidden">
            <div className="fixed top-10 left-10 text-3xl opacity-50 z-0 select-none">
              🍓
            </div>
            <div className="fixed bottom-32 right-10 text-4xl opacity-50 z-0 select-none">
              🥛
            </div>
            <div className="fixed top-40 right-20 text-2xl opacity-50 z-0 select-none">
              ✨
            </div>
            <div className="fixed bottom-20 left-20 text-3xl opacity-50 z-0 select-none">
              🎀
            </div>

            <div className="w-full max-w-4xl relative z-10 flex flex-col gap-6 mt-4">
              <header className="flex flex-col sm:flex-row justify-between items-center gap-6 mb-4">
                <div className="hidden sm:block">
                  <TamagotchiWidget time={time} isPerfect={isPerfect} />
                </div>
                <div className="berry-card bg-berry-cream p-4 sm:px-8 sm:py-6 flex-1 w-full text-center sm:text-left flex items-center justify-center sm:justify-start gap-4">
                  <span className="text-4xl sm:text-5xl">🥛</span>
                  <div>
                    <h1 className="text-2xl sm:text-3xl font-bold text-berry-dark drop-shadow-sm mb-1">
                      ANGELA'S STRAWBERRY DIARY
                    </h1>
                    <p className="text-xs sm:text-sm font-bold text-berry-choco opacity-70">
                      2026 Master Roadmap Planner 🍓
                    </p>
                  </div>
                </div>
                <DDayWidget />
              </header>

              <nav className="flex gap-2 sm:gap-3 justify-start sm:justify-start w-full overflow-x-auto pb-2 hide-scrollbar">
                <button
                  onClick={() => setActiveView("overview")}
                  className={`berry-btn px-4 sm:px-5 py-2 sm:py-3 text-sm sm:text-base font-bold flex items-center gap-2 whitespace-nowrap shrink-0 ${activeView === "overview" ? "berry-btn-active" : ""}`}
                >
                  <span>⭐</span> 북극성
                </button>
                <button
                  onClick={() => setActiveView("finance")}
                  className={`berry-btn px-4 sm:px-5 py-2 sm:py-3 text-sm sm:text-base font-bold flex items-center gap-2 whitespace-nowrap shrink-0 ${activeView === "finance" ? "berry-btn-active" : ""}`}
                >
                  <span>💰</span> 재무
                </button>
                <button
                  onClick={() => setActiveView("timeline")}
                  className={`berry-btn px-4 sm:px-5 py-2 sm:py-3 text-sm sm:text-base font-bold flex items-center gap-2 whitespace-nowrap shrink-0 ${activeView === "timeline" ? "berry-btn-active" : ""}`}
                >
                  <span>📅</span> 타임라인
                </button>
                <button
                  onClick={() => setActiveView("vocab")}
                  className={`berry-btn px-4 sm:px-5 py-2 sm:py-3 text-sm sm:text-base font-bold flex items-center gap-2 whitespace-nowrap shrink-0 ${activeView === "vocab" ? "berry-btn-active" : ""}`}
                >
                  <span>📖</span> 단어장
                </button>
              </nav>

              <main className="w-full min-h-[400px]">
                {activeView === "overview" && (
                  <OverviewView showToast={showToast} user={user} />
                )}
                {activeView === "finance" && (
                  <FinanceView showToast={showToast} user={user} />
                )}
                {activeView === "timeline" && (
                  <TimelineView
                    tasks={tasks}
                    setTasks={setTasks}
                    activeMonth={activeMonth}
                    setActiveMonth={setActiveMonth}
                    showToast={showToast}
                  />
                )}
                {activeView === "vocab" && (
                  <VocabView showToast={showToast} user={user} />
                )}
              </main>
            </div>

            {toast && (
              <div className="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-50 pointer-events-none">
                <div className="anim-toast bg-white border-4 border-berry-dark rounded-3xl px-8 py-4 shadow-[0_10px_20px_rgba(255,77,109,0.3)] flex items-center gap-3">
                  <span className="font-bold text-xl text-berry-dark">
                    {toast}
                  </span>
                </div>
              </div>
            )}

            <style jsx global>{`
              .hide-scrollbar::-webkit-scrollbar {
                display: none;
              }
              .hide-scrollbar {
                -ms-overflow-style: none;
                scrollbar-width: none;
              }
              @keyframes popIn {
                0% {
                  opacity: 0;
                  transform: translateY(10px) scale(0.98);
                }
                100% {
                  opacity: 1;
                  transform: translateY(0) scale(1);
                }
              }
            `}</style>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
