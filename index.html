      // ════════════════════════════════════════════════════════════
      //   VIEW: TASKS
      // ════════════════════════════════════════════════════════════
      function TasksView({
        energy,
        setEnergy,
        tasks,
        handleSkip,
        handleDone,
        hydrangea,
        waterCount,
        isMicroMode,
      }) {
        const blocks = [
          {
            key: "morning",
            title: "오전 워밍업",
            subtitle: "MORNING",
            icon: "☀",
          },
          {
            key: "afternoon",
            title: "오후 여백",
            subtitle: "AFTERNOON",
            icon: "✿",
          },
          {
            key: "evening",
            title: "저녁 100M",
            subtitle: "EVENING",
            icon: "☾",
          },
        ];
        const getVisible = (key) =>
          tasks.filter((t) => t.block === key && (!isMicroMode || t.isMicro));
        const getHidden = (key) =>
          isMicroMode ? tasks.filter((t) => t.block === key && !t.isMicro) : [];

        return (
          <div className="space-y-3">
            <div className="pixel-card p-3 flex gap-3 items-center">
              <div className="flex-1">
                <div className="flex items-center justify-between mb-2">
                  <span className="font-press text-[10px] text-olive-dark">
                    ▸ MOTIVATION TEMP
                  </span>
                  <span className="font-press text-sm text-rose">
                    {energy}/10
                  </span>
                </div>
                <input
                  type="range"
                  min={1}
                  max={10}
                  value={energy}
                  onChange={(e) => setEnergy(Number(e.target.value))}
                  className="pixel-slider w-full"
                />
                <div className="flex justify-between mt-1 font-press text-[8px] text-olive-dark/70">
                  <span>EXHAUST</span>
                  <span>RADIANT</span>
                </div>
              </div>
              <div className="pixel-inset px-3 py-2 text-center min-w-[70px]">
                <div className="text-2xl leading-none">{hydrangea.emoji}</div>
                <div className="font-press text-[8px] text-olive-dark mt-1">
                  💧{waterCount}
                </div>
              </div>
            </div>

            <div
              className={`pixel-chip ${isMicroMode ? "pixel-chip-rose" : "pixel-chip-sky"}`}
            >
              <span>{isMicroMode ? "🕊" : "☀"}</span>
              <span className="font-pixelify text-sm">
                {isMicroMode
                  ? "MICRO MODE — 가벼운 일만 보여줄게요"
                  : "REGULAR MODE — 모든 일정 표시중"}
              </span>
            </div>

            {blocks.map((b) => {
              const visible = getVisible(b.key);
              const hidden = getHidden(b.key);
              return (
                <div key={b.key} className="pixel-card p-3">
                  <div className="flex items-center justify-between mb-2 pb-2 border-b-2 border-dashed border-olive-dark/30">
                    <h3 className="font-press text-xs text-olive-dark flex items-center gap-2">
                      <span className="text-base">{b.icon}</span>
                      {b.title}
                    </h3>
                    <span className="font-press text-[8px] text-olive-dark/60">
                      ▸{b.subtitle}
                    </span>
                  </div>
                  <div className="space-y-2">
                    {visible.length === 0 && (
                      <div className="text-center py-3 font-pixelify text-sm text-olive-dark/70">
                        ✦ 모두 비웠어요. 푹 쉬어요 ✦
                      </div>
                    )}
                    {visible.map((task) => (
                      <div
                        key={task.id}
                        className={`pixel-task transition-all duration-500 ${
                          task.status === "leaving"
                            ? "opacity-0 -translate-x-3 scale-95"
                            : "opacity-100"
                        }`}
                      >
                        <span className="text-xl flex-shrink-0">
                          {task.emoji}
                        </span>
                        <div className="flex-1 min-w-0">
                          <div className="font-pixelify text-base text-olive-darker">
                            {task.text}
                          </div>
                          {task.isMicro && (
                            <div className="font-press text-[7px] text-rose">
                              ✿ MICRO
                            </div>
                          )}
                        </div>
                        <div className="flex gap-1 flex-shrink-0">
                          <button
                            onClick={() => handleSkip(task.id)}
                            className="pixel-btn-sm pixel-btn-cream"
                          >
                            <span className="font-press text-[8px]">SKIP</span>
                          </button>
                          <button
                            onClick={() => handleDone(task.id)}
                            className="pixel-btn-sm pixel-btn-rose"
                          >
                            <span className="font-press text-[8px]">DONE</span>
                          </button>
                        </div>
                      </div>
                    ))}
                  </div>
                  {hidden.length > 0 && (
                    <div className="mt-3 pt-2 border-t-2 border-dashed border-olive-dark/30">
                      <div className="font-pixelify text-xs text-olive-dark/70 italic flex items-center gap-1">
                        🕊 {hidden.length}개의 무거운 일정은 살짝 가려뒀어요
                      </div>
                      <div className="mt-1 space-y-1 opacity-30">
                        {hidden.map((t) => (
                          <div
                            key={t.id}
                            className="font-pixelify text-sm text-olive-darker line-through"
                          >
                            {t.emoji} {t.text}
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        );
      }

      // ════════════════════════════════════════════════════════════
      //   VIEW: GARDEN
      // ════════════════════════════════════════════════════════════
      function GardenView({ waterCount, hydrangea, setWaterCount, showToast }) {
        const grow = () => {
          setWaterCount((c) => c + 1);
          showToast("💧 한 방울 더 주었어요");
        };
        const log = [
          { mood: "✿", text: "DONE 버튼으로 +1 물주기" },
          { mood: "♥", text: `현재 단계 — ${hydrangea.label}` },
          { mood: "☼", text: "10번 물주면 활짝 피어요" },
          { mood: "✦", text: "조급해하지 않아도 괜찮아요" },
        ];
        return (
          <div className="space-y-3">
            <div className="pixel-card p-4 text-center">
              <div className="font-press text-[10px] text-olive-dark mb-3">
                ▸ MY HYDRANGEA
              </div>
              <div className="flex justify-center mb-3 anim-soft-bob">
                <PixelHydrangeaArt size={120} />
              </div>
              <div className="font-press text-sm text-rose">
                {hydrangea.label.toUpperCase()}
              </div>
              <div className="flex justify-center items-center gap-3 mt-3 flex-wrap">
                <div className="pixel-inset px-3 py-1.5">
                  <span className="font-press text-[9px] text-olive-dark">
                    💧 {waterCount} DROPS
                  </span>
                </div>
                <button
                  onClick={grow}
                  className="pixel-btn pixel-btn-rose px-3 py-1.5"
                >
                  <span className="font-press text-[9px]">+ WATER</span>
                </button>
              </div>
            </div>

            <div className="pixel-card p-3">
              <div className="font-press text-[10px] text-olive-dark mb-2">
                ▸ GROWTH NOTES
              </div>
              <div className="space-y-1.5">
                {log.map((l, i) => (
                  <div
                    key={i}
                    className="flex items-center gap-2 font-pixelify text-sm text-olive-darker"
                  >
                    <span className="text-rose">{l.mood}</span>
                    <span>{l.text}</span>
                  </div>
                ))}
              </div>
            </div>

            <div className="pixel-card p-3">
              <div className="font-press text-[10px] text-olive-dark mb-2">
                ▸ TIP OF THE DAY
              </div>
              <div className="font-pixelify text-sm text-olive-darker leading-snug">
                🌿 수국은 천천히 자라요. 오늘 못 자라도 괜찮아요 — 내일도 햇빛은
                충분하니까요.
              </div>
            </div>
          </div>
        );
      }

      // ════════════════════════════════════════════════════════════
      //   VIEW: DIARY
      // ════════════════════════════════════════════════════════════
      function DiaryView({ mood, setMood, text, setText, entries, save }) {
        const moods = [
          { e: "🌤", l: "PEACE" },
          { e: "🌸", l: "HAPPY" },
          { e: "😴", l: "TIRED" },
          { e: "🌧", l: "BLUE" },
          { e: "🌪", l: "ANXY" },
          { e: "🍂", l: "MEH" },
        ];
        return (
          <div className="space-y-3">
            <div className="pixel-card p-3">
              <div className="font-press text-[10px] text-olive-dark mb-2">
                ▸ TODAY I FEEL ...
              </div>
              <div className="grid grid-cols-6 gap-1.5">
                {moods.map((m) => (
                  <button
                    key={m.e}
                    onClick={() => setMood(m.e)}
                    className={`pixel-btn flex flex-col items-center gap-0.5 py-2 transition-all duration-300 ${
                      mood === m.e
                        ? "pixel-btn-rose translate-y-[1px]"
                        : "pixel-btn-cream"
                    }`}
                  >
                    <span className="text-lg">{m.e}</span>
                    <span className="font-press text-[7px]">{m.l}</span>
                  </button>
                ))}
              </div>
            </div>

            <div className="pixel-card p-3">
              <div className="font-press text-[10px] text-olive-dark mb-2">
                ▸ ONE LINE A DAY
              </div>
              <textarea
                value={text}
                onChange={(e) => setText(e.target.value)}
                placeholder="아주 짧아도 괜찮아요. 쉼표 하나여도 좋아요."
                className="pixel-textarea w-full h-20 p-2 font-pixelify text-sm text-olive-darker resize-none"
              />
              <div className="flex justify-between items-center mt-2">
                <div className="font-press text-[8px] text-olive-dark/70">
                  {mood ? `MOOD ${mood}` : "PICK A MOOD"} · {text.length} CHARS
                </div>
                <button
                  onClick={save}
                  disabled={!mood || !text.trim()}
                  className={`pixel-btn px-3 py-1.5 transition-all ${
                    !mood || !text.trim()
                      ? "opacity-40 cursor-not-allowed pixel-btn-cream"
                      : "pixel-btn-rose"
                  }`}
                >
                  <span className="font-press text-[9px]">SAVE ♥</span>
                </button>
              </div>
            </div>

            <div className="pixel-card p-3">
              <div className="font-press text-[10px] text-olive-dark mb-2">
                ▸ RECENT THOUGHTS
              </div>
              <div className="space-y-2">
                {entries.length === 0 && (
                  <div className="font-pixelify text-sm text-olive-dark/70 text-center py-3">
                    ✦ 아직 적은 기록이 없어요 ✦
                  </div>
                )}
                {entries.map((entry) => (
                  <div key={entry.id} className="pixel-inset p-2 anim-fade-in">
                    <div className="flex items-center justify-between mb-1">
                      <span className="text-base">{entry.mood}</span>
                      <span className="font-press text-[8px] text-olive-dark/70">
                        {entry.date}
                      </span>
                    </div>
                    <div className="font-pixelify text-sm text-olive-darker leading-snug">
                      {entry.text}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      }

            desc: "졸졸 — 숲속 시냇물",
          },
          {

              opacity: 0.45;
            }

            @keyframes soft-bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
            @keyframes vis      { 0%,100% { transform: scaleY(0.4); } 50% { transform: scaleY(1); } }
            @keyframes breath   {
              0%,100% { transform: scale(1); background: var(--rose-light); }
              50% { transform: scale(1.4); background: #f5d8e2; }
            }
            @keyframes float-up {
              0%   { opacity: 0; transform: translateY(0) scale(0.6); }
              15%  { opacity: 1; transform: translateY(-30px) scale(1); }
              85%  { opacity: 1; transform: translateY(-220px) scale(1.2); }
              100% { opacity: 0; transform: translateY(-300px) scale(1.4); }
            }
            @keyframes fade-in  { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
            @keyframes view-in  { from { opacity: 0; transform: translateX(8px); } to { opacity: 1; transform: translateX(0); } }
            @keyframes toast-in { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
            @keyframes pad-bob  { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }

            .anim-soft-bob { animation: soft-bob 3s ease-in-out infinite; }
            .anim-vis      { animation: vis 0.6s ease-in-out infinite; transform-origin: bottom; }
            .anim-breath   { animation: breath 8s ease-in-out infinite; }
            .anim-float-up { animation: float-up 4s ease-out forwards; }
            .anim-fade-in  { animation: fade-in 0.4s ease-out both; }
            .anim-view-in  { animation: view-in 0.4s ease-out both; }
            .anim-toast    { animation: toast-in 0.3s ease-out both; }
            .anim-pad      { animation: pad-bob 6s ease-in-out infinite; }

            .window-content::-webkit-scrollbar { width: 14px; }
            .window-content::-webkit-scrollbar-track {
              background: var(--cream-light);
              border-left: 2px solid var(--ink);
            }
            .window-content::-webkit-scrollbar-thumb {
              background: var(--olive);
              border: 2px solid var(--ink);
              box-shadow: inset 1px 1px 0 var(--olive-light), inset -1px -1px 0 var(--olive-dark);
            }
          `}</style>

            <div className="cloud-os min-h-screen w-full flex flex-col font-pixelify relative overflow-hidden">
              {/* DECORATIVE LILY PADS */}
              <div
                className="lily-pad anim-pad"
                style={{ width: 180, height: 80, left: "8%", bottom: "20%" }}
              />
              <div
                className="lily-pad anim-pad"
                style={{
                  width: 240,
                  height: 100,
                  right: "5%",
                  bottom: "12%",
                  animationDelay: "1.5s",
                }}
              />
              <div
                className="lily-pad anim-pad"
                style={{
                  width: 140,
                  height: 60,
                  left: "40%",
                  top: "22%",
                  animationDelay: "3s",
                  opacity: 0.3,
                }}
              />
              <div
                className="lily-pad anim-pad"
                style={{
                  width: 90,
                  height: 40,
                  right: "30%",
                  top: "8%",
                  animationDelay: "2s",
                  opacity: 0.35,
                }}
              />

              <div className="absolute top-6 left-1/2 font-press text-[10px] text-cream-light opacity-50 select-none">
                ▪ ▫ ▪
              </div>
              <div className="absolute bottom-20 right-10 font-press text-[10px] text-cream-light opacity-50 select-none">
                ▫ ▪ ▫ ▫
              </div>

              {/* FLOATING RELEASED WORRIES */}
              {floatingWorries.map((w) => (
                <div
                  key={w.id}
                  className="absolute z-40 pointer-events-none anim-float-up flex flex-col items-center"
                  style={{ left: `${w.x}%`, bottom: "30%" }}
                >
                  <PixelCloudIcon size={48} color="#ebe4b8" />
                  <div className="pixel-inset px-2 py-1 mt-1 max-w-[160px] font-pixelify text-xs text-olive-darker">
                    {w.text}
                  </div>
                </div>
              ))}

              <div className="flex-1 flex p-3 sm:p-4 gap-3 sm:gap-4 overflow-hidden relative z-10">
                {/* SIDEBAR */}
                <aside className="flex flex-col gap-2 sm:gap-3 flex-shrink-0">
                  {sidebar.map((item) => {
                    const Icon = item.Icon;
                    return (
                      <button
                        key={item.id}
                        onClick={() => setActiveView(item.id)}
                        className={`desktop-icon ${activeView === item.id ? "active" : ""}`}
                      >
                        <Icon size={36} />
                        <div className="icon-label">{item.label}</div>
                      </button>
                    );
                  })}
                </aside>

                {/* MAIN PIXEL WINDOW */}
                <main className="pixel-window flex-1 flex flex-col min-w-0">
                  <div className="title-bar">
                    <span className="font-press text-[10px] sm:text-xs flex items-center gap-2 truncate">
                      <span>☁</span>
                      <span className="truncate">
                        {titleByView[activeView]}
                      </span>
                    </span>
                    <div className="flex gap-1 flex-shrink-0">
                      <button className="win-btn">_</button>
                      <button className="win-btn">▢</button>
                      <button className="win-btn">×</button>
                    </div>
                  </div>
                  <div className="window-content flex-1 overflow-y-auto p-3 sm:p-4">
                    <div key={activeView} className="anim-view-in">
                      {activeView === "tasks" && (
                        <TasksView
                          energy={energy}
                          setEnergy={setEnergy}
                          tasks={tasks}
                          handleSkip={handleSkip}
                          handleDone={handleDone}
                          hydrangea={hydrangea}
                          waterCount={waterCount}
                          isMicroMode={isMicroMode}
                        />
                      )}
                      {activeView === "garden" && (
                        <GardenView
                          waterCount={waterCount}
                          hydrangea={hydrangea}
                          setWaterCount={setWaterCount}
                          showToast={showToast}
                        />
                      )}
                      {activeView === "diary" && (
                        <DiaryView
                          mood={diaryMood}
                          setMood={setDiaryMood}
                          text={diaryText}
                          setText={setDiaryText}
                          entries={diaryEntries}
                          save={saveDiary}
                        />
                      )}
                      {activeView === "sounds" && (
                        <SoundsView
                          playingTrack={playingTrack}
                          setPlayingTrack={setPlayingTrack}
                          breathing={breathing}
                          setBreathing={setBreathing}
                          showToast={showToast}
                        />
                      )}
                      {activeView === "bin" && (
                        <BinView
                          worryInput={worryInput}
                          setWorryInput={setWorryInput}
                          releasedCount={releasedCount}
                          releaseWorry={releaseWorry}
                        />
                      )}
                    </div>
                  </div>
                </main>
              </div>

              {/* TASKBAR */}
              <footer className="taskbar relative z-10">
                <button className="start-btn">
                  <PixelStartIcon size={14} />
                  <span>START</span>
                </button>
                <div className="taskbar-app">
                  <span>☁</span>
                  <span>{titleByView[activeView]}</span>
                </div>
                <div className="clock">{time}</div>
              </footer>

              {/* TOAST */}
              {toast && (
                <div className="fixed top-6 left-1/2 -translate-x-1/2 z-50">
                  <div className="pixel-card px-4 py-2 anim-toast">
                    <span className="font-pixelify text-base text-olive-darker">
                      {toast}
                    </span>
                  </div>
                </div>
              )}
            </div>
          </>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
